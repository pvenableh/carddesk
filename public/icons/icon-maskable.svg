<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Landing-page ambient blobs: Fresh/seaMist tint stops over cd-bg -->
    <radialGradient id="blobA">
      <stop offset="0%" stop-color="hsl(163 100% 34%)" stop-opacity="0.34"/>
      <stop offset="70%" stop-color="hsl(163 100% 34%)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB">
      <stop offset="0%" stop-color="hsl(213 64% 42%)" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="hsl(213 64% 42%)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobC">
      <stop offset="0%" stop-color="hsl(278 100% 38%)" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="hsl(278 100% 38%)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobD">
      <stop offset="0%" stop-color="hsl(190 80% 44%)" stop-opacity="0.24"/>
      <stop offset="70%" stop-color="hsl(190 80% 44%)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lit" gradientUnits="userSpaceOnUse" x1="0" y1="-96" x2="0" y2="100">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="18%" stop-color="#f4f8ff"/>
      <stop offset="100%" stop-color="#9aa6ba"/>
    </linearGradient>
    <filter id="soften" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="sh5" x="-90%" y="-90%" width="280%" height="280%">
      <feDropShadow dx="0" dy="30" stdDeviation="46" flood-color="#000" flood-opacity="1"/>
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- full-bleed dark base + soft color blobs (no rounded corners; OS masks) -->
  <rect width="512" height="512" fill="#060810"/>
  <g filter="url(#soften)">
    <ellipse cx="256" cy="256" rx="520" ry="540" fill="url(#blobB)"/>
    <ellipse cx="40" cy="20" rx="460" ry="430" fill="url(#blobA)"/>
    <ellipse cx="350" cy="540" rx="540" ry="480" fill="url(#blobC)"/>
    <ellipse cx="-20" cy="450" rx="420" ry="440" fill="url(#blobD)"/>
  </g>

  <!-- card scaled to ~82% so it stays inside the maskable safe zone -->
  <g transform="translate(256 256) scale(0.82)" fill="none"
     stroke-linecap="round" stroke-linejoin="round" filter="url(#sh5)">
    <rect x="-138" y="-90" width="276" height="186" rx="28" stroke="url(#lit)" stroke-width="14"/>
    <line x1="-104" y1="-46" x2="60" y2="-46" stroke="url(#lit)" stroke-width="14" opacity="0.95"/>
    <line x1="-104" y1="-10" x2="14" y2="-10" stroke="url(#lit)" stroke-width="12" opacity="0.7"/>
    <line x1="-104" y1="24" x2="40" y2="24" stroke="url(#lit)" stroke-width="12" opacity="0.55"/>
  </g>
</svg>
