<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Transparent background; a single bold card glyph enlarged to fill the
       frame so it reads at 16px. The stroke gradient is theme-aware:
       • light mode (default) — the darker, more saturated icon.svg palette,
         so the mark holds up against the light-grey browser chrome bar.
       • dark mode — the bright .lp-grad (cd-green → palette-primary → cd-ice). -->
  <style>
    /* light mode default — darker gradient, imitating icon.svg's blob tints */
    #s0 { stop-color: hsl(163 100% 34%); }
    #s1 { stop-color: hsl(213 64% 42%); }
    #s2 { stop-color: hsl(190 80% 44%); }
    @media (prefers-color-scheme: dark) {
      /* dark mode — bright .lp-grad */
      #s0 { stop-color: #70FFD7; }
      #s1 { stop-color: #4da6ff; }
      #s2 { stop-color: #a8d8ea; }
    }
  </style>
  <defs>
    <!-- linear-gradient(100deg, ...) ≈ left→right tilted ~10° downward.
         userSpaceOnUse so horizontal lines (zero-height bbox) still get the
         full gradient; coords are in the translated glyph space below. -->
    <linearGradient id="fb-grad" gradientUnits="userSpaceOnUse"
                    x1="-216" y1="-60" x2="216" y2="60">
      <stop id="s0" offset="0%"/>
      <stop id="s1" offset="55%"/>
      <stop id="s2" offset="100%"/>
    </linearGradient>
  </defs>

  <!-- bold card glyph, gradient stroke, enlarged to fill the badge -->
  <g transform="translate(256 256)" fill="none" stroke="url(#fb-grad)"
     stroke-linecap="round" stroke-linejoin="round">
    <rect x="-216" y="-150" width="432" height="300" rx="52" stroke-width="38"/>
    <line x1="-160" y1="-74" x2="104" y2="-74" stroke-width="38"/>
    <line x1="-160" y1="16" x2="8" y2="16" stroke-width="36"/>
  </g>
</svg>
