<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- .lp-grad — linear-gradient(100deg, cd-green, palette-primary 55%, cd-ice) -->
    <linearGradient id="lp-grad" x1="0" y1="0" x2="1" y2="0.22">
      <stop offset="0" stop-color="#70FFD7"/>
      <stop offset="0.55" stop-color="#4da6ff"/>
      <stop offset="1" stop-color="#a8d8ea"/>
    </linearGradient>
    <!-- same gradient in user space, for the card-icon strokes (zero-height bbox safe) -->
    <linearGradient id="lp-grad-icon" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="84" y2="22">
      <stop offset="0" stop-color="#70FFD7"/>
      <stop offset="0.55" stop-color="#4da6ff"/>
      <stop offset="1" stop-color="#a8d8ea"/>
    </linearGradient>

    <!-- aurora blobs (reused from the existing OG) -->
    <filter id="aurora" x="-620" y="-610" width="2460" height="1910" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="90"/>
    </filter>
    <radialGradient id="b0" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 90) scale(620 520)">
      <stop stop-color="#00B884" stop-opacity="0.5"/><stop offset="0.7" stop-color="#00B884" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(560 320) scale(700 620)">
      <stop stop-color="#236DC7" stop-opacity="0.55"/><stop offset="0.7" stop-color="#236DC7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 560) scale(680 560)">
      <stop stop-color="#8100CC" stop-opacity="0.5"/><stop offset="0.7" stop-color="#8100CC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1080 120) scale(520 480)">
      <stop stop-color="#0CC4E9" stop-opacity="0.32"/><stop offset="0.7" stop-color="#0CC4E9" stop-opacity="0"/>
    </radialGradient>

    <!-- liquid-glass surface fill (135deg tint over a dark translucent base) -->
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9fe9d6" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#7fb9e6" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#8aa6ff" stop-opacity="0.11"/>
    </linearGradient>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="34" flood-color="#000814" flood-opacity="0.55"/>
    </filter>
    <filter id="chipShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000814" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- ═══ background ═══ -->
  <rect width="1200" height="630" fill="#060810"/>
  <g filter="url(#aurora)" opacity="0.95">
    <ellipse cx="180" cy="90" rx="620" ry="520" fill="url(#b0)"/>
    <ellipse cx="560" cy="320" rx="700" ry="620" fill="url(#b1)"/>
    <ellipse cx="980" cy="560" rx="680" ry="560" fill="url(#b2)"/>
    <ellipse cx="1080" cy="120" rx="520" ry="480" fill="url(#b3)"/>
  </g>

  <!-- ═══ wordmark (centered) ═══ -->
  <g transform="translate(471 56)">
    <g stroke="url(#lp-grad-icon)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="2" width="78" height="54" rx="12" stroke-width="6"/>
      <line x1="12" y1="22" x2="52" y2="22" stroke-width="6"/>
      <line x1="12" y1="37" x2="37" y2="37" stroke-width="5"/>
    </g>
    <text x="96" y="49" font-family="'Bebas Neue', sans-serif" font-size="52" letter-spacing="4">
      <tspan fill="#70FFD7">CARD</tspan><tspan fill="#f0f4ff">DESK</tspan>
    </text>
  </g>

  <!-- ═══ centered statement ═══ -->
  <text x="600" y="210" text-anchor="middle" font-family="'Bebas Neue', sans-serif" font-size="34" letter-spacing="7" fill="#70FFD7" opacity="0.85">YOUR NETWORK. GAMIFIED.</text>

  <text x="600" y="320" text-anchor="middle" font-family="'Bebas Neue', sans-serif" font-size="116" letter-spacing="1" fill="#f0f4ff">Networking, but</text>
  <text x="600" y="430" text-anchor="middle" font-family="'Bebas Neue', sans-serif" font-size="116" letter-spacing="1">
    <tspan fill="#f0f4ff">make it a </tspan><tspan fill="url(#lp-grad)">game.</tspan>
  </text>

  <text x="600" y="486" text-anchor="middle" font-family="'Avenir Next','Helvetica Neue',sans-serif" font-size="25" font-weight="500" fill="#aeb9cc">Turn the business cards piling up in your pocket into XP, streaks, and real relationships.</text>

  <!-- glass chip row -->
  <g filter="url(#chipShadow)">
    <!-- +50 XP -->
    <g transform="translate(348 532)">
      <rect width="132" height="52" rx="26" fill="url(#glass)"/>
      <rect width="132" height="52" rx="26" fill="#10261f" fill-opacity="0.55"/>
      <rect x="0.5" y="0.5" width="131" height="51" rx="25.5" fill="none" stroke="#70FFD7" stroke-opacity="0.42"/>
      <text x="66" y="34" text-anchor="middle" font-family="'Avenir Next','Helvetica Neue',sans-serif" font-size="22" font-weight="800" fill="#70FFD7">+50 XP</text>
    </g>
    <!-- 7-day streak -->
    <g transform="translate(496 532)">
      <rect width="200" height="52" rx="26" fill="url(#glass)"/>
      <rect width="200" height="52" rx="26" fill="#1d1322" fill-opacity="0.6"/>
      <rect x="0.5" y="0.5" width="199" height="51" rx="25.5" fill="none" stroke="#ff8a3d" stroke-opacity="0.42"/>
      <path d="M30 15 C34 20 33 24 30 27 C27 30 27 34 30 37 C24 36 21 31 24 25 C25 22 27 21 26 17 C28 16 29 16 30 15 Z" fill="#ff8a3d"/>
      <text x="52" y="34" font-family="'Avenir Next','Helvetica Neue',sans-serif" font-size="21" font-weight="700" fill="#ffd0b0">7-day streak</text>
    </g>
    <!-- +1 to Orbit -->
    <g transform="translate(712 532)">
      <rect width="180" height="52" rx="26" fill="url(#glass)"/>
      <rect width="180" height="52" rx="26" fill="#161a2e" fill-opacity="0.6"/>
      <rect x="0.5" y="0.5" width="179" height="51" rx="25.5" fill="none" stroke="#8aa6ff" stroke-opacity="0.42"/>
      <g transform="translate(28 26)" fill="none" stroke="#a9bcff" stroke-width="2.2">
        <ellipse cx="0" cy="0" rx="12" ry="5.5" transform="rotate(-30)"/>
        <circle cx="0" cy="0" r="3.2" fill="#a9bcff" stroke="none"/>
      </g>
      <text x="50" y="34" font-family="'Avenir Next','Helvetica Neue',sans-serif" font-size="21" font-weight="700" fill="#c7d2f5">+1 to Orbit</text>
    </g>
  </g>
</svg>
