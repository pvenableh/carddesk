<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>CardDesk embed — test harness</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #1d1d1f;
      background: #f3f4f6;
      padding: 40px 20px 80px;
    }
    .wrap { max-width: 880px; margin: 0 auto; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: #6b7280; margin: 0 0 24px; }
    .controls {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: end;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; margin-bottom: 28px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #6b7280; }
    input, select {
      font: inherit; padding: 9px 11px; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; min-width: 220px;
    }
    button {
      font: 600 14px system-ui; padding: 10px 18px; border: 0; border-radius: 8px;
      background: #0b0d14; color: #fff; cursor: pointer;
    }
    button:hover { opacity: .9; }
    .grid { display: grid; gap: 28px; grid-template-columns: 1fr; }
    @media (min-width: 720px) { .grid { grid-template-columns: 420px 1fr; } }
    .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 18px; }
    .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: #6b7280; margin: 0 0 14px; }
    .note { font-size: 12px; color: #9ca3af; margin-top: 14px; }
    code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>CardDesk embed — test harness</h1>
    <p class="sub">Simulates a third-party site embedding a card. Loads the real <code>/embed.js</code>. Enter a CardDesk user id (the same id used at <code>/c/&lt;id&gt;</code>) and apply.</p>

    <div class="controls">
      <div class="field">
        <label for="cid">Card / user id</label>
        <input id="cid" placeholder="00000000-0000-0000-0000-000000000000" />
      </div>
      <div class="field">
        <label for="theme">Theme override</label>
        <select id="theme">
          <option value="">Saved design</option>
          <option value="carddesk">carddesk</option>
          <option value="glass">glass</option>
          <option value="editorial">editorial</option>
          <option value="tech">tech</option>
        </select>
      </div>
      <button type="button" onclick="render()">Apply</button>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>Inline</h2>
        <div id="inline-slot"></div>
      </div>
      <div class="panel">
        <h2>Popup (button → modal)</h2>
        <div id="popup-slot"></div>
        <p class="note">Click the button to open the card in a modal overlay.</p>
      </div>
    </div>
  </div>

  <!-- The real loader. Resolves its own origin, so this works in dev and prod. -->
  <script async src="/embed.js"></script>
  <script>
    function mk(parent, attrs) {
      var d = document.createElement('div');
      d.className = 'carddesk-embed';
      for (var k in attrs) { if (attrs[k]) d.setAttribute(k, attrs[k]); }
      parent.appendChild(d);
    }
    function render() {
      var id = document.getElementById('cid').value.trim() || 'YOUR_USER_ID';
      var theme = document.getElementById('theme').value;
      var inline = document.getElementById('inline-slot');
      var popup = document.getElementById('popup-slot');
      // Clear previous mounts (removing the nodes drops their mounted flags).
      inline.innerHTML = '';
      popup.innerHTML = '';
      // embed.js picks these up via its MutationObserver / mountAll.
      mk(inline, { 'data-card-id': id, 'data-theme': theme });
      mk(popup, { 'data-card-id': id, 'data-mode': 'popup', 'data-label': 'Book a Call', 'data-theme': theme });
    }
    // Prefill from ?id= and render on load.
    var q = new URLSearchParams(location.search);
    if (q.get('id')) document.getElementById('cid').value = q.get('id');
    if (q.get('theme')) document.getElementById('theme').value = q.get('theme');
    render();
  </script>
</body>
</html>
