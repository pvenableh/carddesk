<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#060810"/>
<title>CardDesk — Offline</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #060810; color: #e9eef5; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Barlow", system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    text-align: center;
  }
  .wrap { max-width: 320px; }
  .logo {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 2px; font-size: 14px; font-weight: 700;
    color: #6b7280; margin-bottom: 28px;
  }
  .logo span { color: #00ff87; }
  h1 { font-size: 24px; font-weight: 700; margin: 0 0 10px; letter-spacing: -0.01em; }
  p { font-size: 14px; line-height: 1.5; color: #9aa3b2; margin: 0 0 22px; }
  button {
    appearance: none; border: 0; cursor: pointer;
    background: #00ff87; color: #060810;
    font-family: inherit; font-weight: 700; font-size: 13px;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 12px 22px; border-radius: 9999px;
  }
  button:active { transform: scale(0.97); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">CARD<span>DESK</span></div>
    <h1>You're offline</h1>
    <p>CardDesk needs a connection to reach your contacts. Once you're back online, tap below to retry.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
